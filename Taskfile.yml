version: '3'

tasks:
  default:
    cmds:
      - task: ci

  build:
    cmds:
      - mkdir -p bin
      - go build -ldflags "-X main.version=dev" -o ./bin/engram-monitor-tui ./cmd/engram-monitor-tui

  install:
    cmds:
      - mkdir -p "$HOME/.local/bin"
      - go build -ldflags "-X main.version=dev" -o "$HOME/.local/bin/engram-monitor-tui" ./cmd/engram-monitor-tui

  test:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  fmt:
    cmds:
      - gofmt -w ./cmd ./internal

  vet:
    cmds:
      - go vet ./...

  coverage-html:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  coverage-check:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out | tee coverage.txt
      - |
        total=$(grep total: coverage.txt | awk '{print $3}' | sed 's/%//')
        echo "Coverage: ${total}%"
        awk '/^total:/ {print "Total coverage: " $3}' coverage.txt
        if [ $(awk -v cov="$total" 'BEGIN {print (cov>=40)?0:1}') -ne 0 ]; then echo "Coverage ${total}% is below threshold 40%"; exit 1; fi

  dist:
    cmds:
      - echo "Building local dist via goreleaser (requires goreleaser installed locally)"
      - goreleaser release --clean --snapshot

  release:
    cmds:
      - 'echo "Releases are published by GitHub Actions when you push a v* tag."'
      - 'echo "Example: git tag v0.1.0 && git push origin v0.1.0"'

  docs:
    cmds:
      - mkdir -p docs
      - 'awk ''BEGIN{print "---\nlayout: default\n---\n"}{print}'' README.md > docs/index.md'
      - touch docs/.nojekyll

  ci:
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - task: build
