name: Bug report
description: Report a defect or regression in engram-monitor-tui
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `engram-monitor-tui version`
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include what you expected to happen too.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `engram-monitor-tui tui`
        2. Run `engram-monitor-tui projects list`
        3. ...
    validations:
      required: true
